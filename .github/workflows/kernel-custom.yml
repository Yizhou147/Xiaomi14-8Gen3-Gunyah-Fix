name: Xiaomi 14 GKI 内核 (Gunyah Fix)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # ==================== 内核版本配置 ====================
      android_version:
        description: "Android 版本"
        required: true
        type: choice
        options:
          - android14
        default: android14
      kernel_version:
        description: "内核版本"
        required: true
        type: choice
        options:
          - "6.1"
        default: "6.1"
      sub_level:
        description: "子版本号 (如 138)"
        required: true
        type: string
        default: "138"
      os_patch_level:
        description: "安全补丁级别 (如 2025-06)"
        required: true
        type: string
        default: "2025-06"
      revision:
        description: "修订版本"
        required: false
        type: string
        default: ""

      # ==================== KernelSU 配置 ====================
      kernelsu_variant:
        description: "KernelSU 变体"
        required: true
        type: choice
        options:
          - None
          - Official
          - SukiSU
          - ReSukiSU
        default: Official
      kernelsu_branch:
        description: "KSU 分支"
        required: true
        type: choice
        options:
          - Stable(标准)
          - Dev(开发)
          - Latest(最新)
          - Custom(自定义)
        default: Stable(标准)

      # ==================== DroidSpaces 支持 ====================
      virtualization_support:
        description: "DroidSpaces 支持 (678=槽位补丁)"
        required: false
        type: choice
        options:
          - "off"
          - "on"
          - "678"
          - "123"
          - "345"
        default: "678"

      # ==================== Gunyah 修复 ====================
      use_gunyah:
        description: "应用 8 Gen 3 Gunyah VMID 修复"
        required: false
        type: boolean
        default: true

      # ==================== 可选配置 ====================
      custom_ref:
        description: "自定义引用 (仅在KSU分支为'Custom(自定义)'时使用)"
        required: false
        type: string
      version:
        description: "自定义版本名 (可选)"
        required: false
        type: string
      build_time:
        description: "自定义构建时间"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"

      # ==================== 功能开关 ====================
      use_zram:
        description: "启用 ZRAM 增强算法"
        required: false
        type: boolean
        default: false
      use_bbg:
        description: "启用 BBG"
        required: false
        type: boolean
        default: false
      use_ddk:
        description: "启用 DDK"
        required: false
        type: boolean
        default: false
      use_ntsync:
        description: "启用 NTsync"
        required: false
        type: boolean
        default: false
      use_networking:
        description: "启用网络增强（IPSet + BBR）"
        required: false
        type: boolean
        default: false
      use_kpm:
        description: "启用 KPM 功能"
        required: false
        type: boolean
        default: false
      use_rekernel:
        description: "启用 Re-Kernel 驱动"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "禁用 SUSFS"
        required: false
        type: boolean
        default: true
      supp_op:
        description: "启用一加 8E 支持"
        required: false
        type: boolean
        default: false

jobs:
  build-custom-kernel:
    name: "Xiaomi14-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: ${{ inputs.android_version }}
      kernel_version: ${{ inputs.kernel_version }}
      sub_level: ${{ inputs.sub_level }}
      os_patch_level: ${{ inputs.os_patch_level }}
      revision: ${{ inputs.revision || '' }}
      ksu_variant: ${{ inputs.kernelsu_variant }}
      ksu_branch: ${{ inputs.kernelsu_branch }}
      custom_ref: ${{ inputs.custom_ref || '' }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_ddk: ${{ inputs.use_ddk }}
      use_ntsync: ${{ inputs.use_ntsync || false }}
      use_networking: ${{ inputs.use_networking || false }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: ${{ inputs.supp_op || false }}
      enable_susfs: ${{ !inputs.cancel_susfs }}
      use_gunyah: ${{ inputs.use_gunyah }}
      virtualization_support: ${{ inputs.virtualization_support || 'off' }}

  get-ksu-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      ksu_branch: ${{ inputs.kernelsu_branch }}
      custom_ref: ${{ inputs.custom_ref || '' }}
