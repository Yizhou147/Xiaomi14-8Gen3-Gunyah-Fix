name: "构建内核 (Gunyah修复版)"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  actions: write
on:
  workflow_dispatch:
    inputs:
      android_version:
        description: "Android 版本"
        type: choice
        options: [android14]
        default: android14
      kernel_version:
        description: "内核版本"
        type: choice
        options: ["6.1"]
        default: "6.1"
      sub_level:
        description: "子版本号 (如 138)"
        type: string
        default: "138"
      os_patch_level:
        description: "安全补丁级别 (如 2025-06)"
        type: string
        default: "2025-06"
      kernelsu_variant:
        description: "KernelSU 变体"
        type: choice
        options: [Official, SukiSU, ReSukiSU, None]
        default: Official
      kernelsu_branch:
        description: "KernelSU 分支"
        type: choice
        options: ["Stable(标准)", "Dev(开发)", "Latest(最新)", "Custom(自定义)"]
        default: "Stable(标准)"
      use_ntsync:
        description: "启用 NTsync"
        type: boolean
        default: true
      virtualization_support:
        description: "虚拟化支持"
        type: choice
        options: ["off", "on", "678", "123", "345"]
        default: "on"
jobs:
  build-kernel:
    name: "Gunyah修复 + 构建内核"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      KERNEL_ROOT: kernel_workspace
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 清理磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 git curl ccache libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip gawk dos2unix zip bc python3-pip
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o repo
          chmod +x repo
          sudo mv repo /usr/local/bin/repo

      - name: 配置 ccache
        run: |
          mkdir -p ~/.ccache
          ccache -M 8G
          ccache -z

      - name: 恢复 ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: gunyah-ccache-${{ runner.os }}-${{ inputs.kernel_version }}
          restore-keys: |
            gunyah-ccache-${{ runner.os }}-

      - name: 缓存 Bazel
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/bazel
          key: gunyah-bazel-${{ runner.os }}-${{ inputs.kernel_version }}
          restore-keys: |
            gunyah-bazel-${{ runner.os }}-

      - name: 配置 Git
        run: |
          git config --global user.name "builder"
          git config --global user.email "builder@users.noreply.github.com"

      - name: 同步 GKI 内核源码
        run: |
          mkdir -p ${{ env.KERNEL_ROOT }}
          cd ${{ env.KERNEL_ROOT }}

          FORMATTED_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
          echo "初始化 repo，分支: common-${FORMATTED_BRANCH}"

          repo init --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b "common-${FORMATTED_BRANCH}" \
            --repo-rev=v2.16

          REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common "${FORMATTED_BRANCH}" || true)
          DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml

          if grep -q deprecated <<< $REMOTE_BRANCH; then
            echo "检测到已弃用的分支: ${FORMATTED_BRANCH}"
            sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" $DEFAULT_MANIFEST_PATH
          fi

          repo --trace sync -c -j$(nproc --all) --no-tags --fail-fast

      - name: 添加 KernelSU
        if: inputs.kernelsu_variant != 'None'
        run: |
          cd ${{ env.KERNEL_ROOT }}
          case "${{ inputs.kernelsu_variant }}" in
            "Official")
              echo "添加 KernelSU Official..."
              curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "stable" || true
              ;;
            "SukiSU")
              echo "添加 SukiSU..."
              curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "stable" || true
              ;;
            "ReSukiSU")
              echo "添加 ReSukiSU..."
              curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s "stable" || true
              ;;
          esac

      - name: 应用 Gunyah 补丁
        run: |
          cd ${{ env.KERNEL_ROOT }}/common

          echo "下载 Gunyah 内存修复补丁..."
          wget -q https://raw.githubusercontent.com/Yizhou147/Xiaomi14-8Gen3-Gunyah-Fix/master/patches/0001-arm64-dts-qcom-sm8650-reserve-gunyah-metadata.patch
          wget -q https://raw.githubusercontent.com/Yizhou147/Xiaomi14-8Gen3-Gunyah-Fix/master/patches/0002-arm64-dts-qcom-sm8650-fix-gunyah-memory-region.patch

          echo "应用 Gunyah 内存修复补丁..."
          git apply --check 0001-arm64-dts-qcom-sm8650-reserve-gunyah-metadata.patch 2>/dev/null && \
            git apply 0001-arm64-dts-qcom-sm8650-reserve-gunyah-metadata.patch && \
            echo "✓ 补丁1应用成功" || \
            echo "⚠ 补丁1可能已应用或存在冲突"

          git apply --check 0002-arm64-dts-qcom-sm8650-fix-gunyah-memory-region.patch 2>/dev/null && \
            git apply 0002-arm64-dts-qcom-sm8650-fix-gunyah-memory-region.patch && \
            echo "✓ 补丁2应用成功" || \
            echo "⚠ 补丁2可能已应用或存在冲突"

          echo "Gunyah 补丁应用完成"

      - name: 备份基准 defconfig
        run: |
          cd ${{ env.KERNEL_ROOT }}/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          if [ -f "$DEFCONFIG" ]; then
            cp "$DEFCONFIG" "${DEFCONFIG}.orig"
            echo "已备份 defconfig"
          fi

      - name: 配置内核选项
        run: |
          cd ${{ env.KERNEL_ROOT }}/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"

          # KernelSU 配置
          if [ "${{ inputs.kernelsu_variant }}" != "None" ]; then
            echo "CONFIG_KSU=y" >> "$DEFCONFIG"
            echo "CONFIG_TMPFS_XATTR=y" >> "$DEFCONFIG"
            echo "CONFIG_TMPFS_POSIX_ACL=y" >> "$DEFCONFIG"
          fi

          # Gunyah 相关配置
          echo "CONFIG_GUNYAH=y" >> "$DEFCONFIG"
          echo "CONFIG_GUNYAH_PLATFORM_HOOKS=y" >> "$DEFCONFIG"
          echo "CONFIG_GUNYAH_QCOM_PLATFORM=y" >> "$DEFCONFIG"

          # NTsync
          if [ "${{ inputs.use_ntsync }}" = "true" ]; then
            echo "CONFIG_NTSYNC=y" >> "$DEFCONFIG"
          fi

          echo "内核选项配置完成"

      - name: 编译内核
        run: |
          cd ${{ env.KERNEL_ROOT }}

          # 提取 defconfig 差异
          DEFCONFIG="common/arch/arm64/configs/gki_defconfig"
          FRAG="common/arch/arm64/configs/ksu.fragment"
          diff "${DEFCONFIG}.orig" "$DEFCONFIG" | grep '^>' | sed 's/^> //; s/^[[:space:]]*//' > "$FRAG" || true
          cp "${DEFCONFIG}.orig" "$DEFCONFIG"

          FRAG_FLAG=""
          if [ -s "$FRAG" ]; then
            FRAG_FLAG="--defconfig_fragment=//common:arch/arm64/configs/ksu.fragment"
          fi

          echo "开始编译内核..."
          tools/bazel build --disk_cache=/home/runner/.cache/bazel --config=fast --lto=thin $FRAG_FLAG //common:kernel_aarch64_dist

          if [ -f bazel-bin/common/kernel_aarch64/Image ]; then
            echo "内核编译成功！"
            ls -lh bazel-bin/common/kernel_aarch64/Image
          else
            echo "::error::内核编译失败"
            exit 1
          fi

      - name: 准备产物
        run: |
          mkdir -p output
          cd ${{ env.KERNEL_ROOT }}

          # 复制 Image 文件
          cp bazel-bin/common/kernel_aarch64/Image ../output/
          cp bazel-bin/common/kernel_aarch64/Image.lz4 ../output/ 2>/dev/null || true

          # 创建 AnyKernel3 包
          cd ..
          git clone https://github.com/WildKernels/AnyKernel3.git -b gki-2.0 --depth=1
          cd AnyKernel3
          cp ../output/Image ./
          ZIP_NAME="android14-6.1.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-GunyahFix-AnyKernel3.zip"
          zip -r "../output/${ZIP_NAME}" ./*

          echo "产物准备完成"
          ls -lh ../output/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: "GunyahFix-${{ inputs.kernelsu_variant }}-android14-6.1-${{ inputs.sub_level }}"
          path: output/
          retention-days: 30

      - name: 发布到 Releases
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v6.1.${{ inputs.sub_level }}-GunyahFix-${{ github.run_number }}"
          name: "小米14 Gunyah修复内核 6.1.${{ inputs.sub_level }}"
          body: |
            ## 小米14 (SM8650) Gunyah 修复内核

            **构建参数**:
            - 内核版本: 6.1.${{ inputs.sub_level }}
            - 安全补丁: ${{ inputs.os_patch_level }}
            - KernelSU: ${{ inputs.kernelsu_variant }}
            - NTsync: ${{ inputs.use_ntsync }}
            - 虚拟化: ${{ inputs.virtualization_support }}

            **修复内容**:
            - 修复骁龙8 Gen 3 (SM8650) 的 Gunyah 内存分配问题
            - 解决虚拟机启动失败问题 (CVE-2026-43347)

            **使用说明**:
            1. 下载 AnyKernel3.zip
            2. 通过 TWRP 或 Kernel Manager 刷入
            3. 重启设备
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}