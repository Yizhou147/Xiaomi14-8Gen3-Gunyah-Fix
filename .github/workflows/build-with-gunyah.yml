name: "构建内核 (Gunyah修复版)"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  actions: write
on:
  workflow_dispatch:
    inputs:
      android_version:
        description: "Android 版本"
        type: choice
        options: [android14]
        default: android14
      kernel_version:
        description: "内核版本"
        type: choice
        options: ["6.1"]
        default: "6.1"
      sub_level:
        description: "子版本号 (如 138)"
        type: string
        default: "138"
      os_patch_level:
        description: "安全补丁级别 (如 2025-06)"
        type: string
        default: "2025-06"
      kernelsu_variant:
        description: "KernelSU 变体"
        type: choice
        options: [Official, SukiSU, ReSukiSU, None]
        default: Official
      kernelsu_branch:
        description: "KernelSU 分支"
        type: choice
        options: ["Stable(标准)", "Dev(开发)", "Latest(最新)", "Custom(自定义)"]
        default: "Stable(标准)"
      use_ntsync:
        description: "启用 NTsync"
        type: boolean
        default: true
      virtualization_support:
        description: "虚拟化支持"
        type: choice
        options: ["off", "on", "678", "123", "345"]
        default: "on"
jobs:
  apply-gunyah-patch-and-build:
    name: "Gunyah修复 + 构建内核"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 git curl ccache libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip gawk dos2unix zip gcc-aarch64-linux-gnu bc
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o repo
          chmod +x repo
          sudo mv repo /usr/local/bin/repo

      - name: 配置 ccache
        run: |
          mkdir -p ~/.ccache
          ccache -M 8G
          ccache -z

      - name: 恢复 ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: gunyah-ccache-${{ runner.os }}-${{ inputs.kernel_version }}
          restore-keys: |
            gunyah-ccache-${{ runner.os }}-

      - name: 同步 GKI 内核源码
        run: |
          git config --global user.name "builder"
          git config --global user.email "builder@users.noreply.github.com"

          mkdir -p kernel_workspace
          cd kernel_workspace

          FORMATTED_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
          echo "初始化 repo，分支: common-${FORMATTED_BRANCH}"

          repo init --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b "common-${FORMATTED_BRANCH}" \
            --repo-rev=v2.16

          repo sync -c -j"$(nproc --all)" --no-tags --fail-fast

      - name: 添加 KernelSU
        if: inputs.kernelsu_variant != 'None'
        run: |
          cd kernel_workspace
          case "${{ inputs.kernelsu_variant }}" in
            "Official")
              curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "stable"
              ;;
            "SukiSU")
              curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "stable"
              ;;
            "ReSukiSU")
              curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s "stable"
              ;;
          esac

      - name: 应用 Gunyah 补丁
        run: |
          cd kernel_workspace/common

          # 下载 Gunyah 补丁
          wget https://raw.githubusercontent.com/Yizhou147/Xiaomi14-8Gen3-Gunyah-Fix/master/patches/0001-arm64-dts-qcom-sm8650-reserve-gunyah-metadata.patch
          wget https://raw.githubusercontent.com/Yizhou147/Xiaomi14-8Gen3-Gunyah-Fix/master/patches/0002-arm64-dts-qcom-sm8650-fix-gunyah-memory-region.patch

          # 应用补丁
          echo "应用 Gunyah 内存修复补丁..."
          git apply --check 0001-arm64-dts-qcom-sm8650-reserve-gunyah-metadata.patch 2>/dev/null && \
            git apply 0001-arm64-dts-qcom-sm8650-reserve-gunyah-metadata.patch || \
            echo "警告: 补丁1可能已应用或存在冲突"

          git apply --check 0002-arm64-dts-qcom-sm8650-fix-gunyah-memory-region.patch 2>/dev/null && \
            git apply 0002-arm64-dts-qcom-sm8650-fix-gunyah-memory-region.patch || \
            echo "警告: 补丁2可能已应用或存在冲突"

          echo "Gunyah 补丁应用完成"

      - name: 配置内核
        run: |
          cd kernel_workspace/common
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig

          # 启用 KernelSU
          if [ "${{ inputs.kernelsu_variant }}" != "None" ]; then
            echo "CONFIG_KSU=y" >> .config
          fi

          # 启用 Gunyah 相关配置
          echo "CONFIG_GUNYAH=y" >> .config
          echo "CONFIG_GUNYAH_PLATFORM_HOOKS=y" >> .config
          echo "CONFIG_GUNYAH_QCOM_PLATFORM=y" >> .config

          # 启用 NTsync
          if [ "${{ inputs.use_ntsync }}" = "true" ]; then
            echo "CONFIG_NTSYNC=y" >> .config
          fi

          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: 编译内核
        run: |
          cd kernel_workspace/common
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          make -j"$(nproc --all)" ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- Image

          if [ -f arch/arm64/boot/Image ]; then
            echo "内核编译成功！"
            ls -lh arch/arm64/boot/Image
          else
            echo "::error::内核编译失败"
            exit 1
          fi

      - name: 准备产物
        run: |
          mkdir -p output
          cp kernel_workspace/common/arch/arm64/boot/Image output/
          cp kernel_workspace/common/arch/arm64/boot/Image.lz4 output/ 2>/dev/null || true

          # 创建 AnyKernel3 包
          git clone https://github.com/WildKernels/AnyKernel3.git -b gki-2.0 --depth=1
          cd AnyKernel3
          cp ../kernel_workspace/common/arch/arm64/boot/Image ./
          ZIP_NAME="android14-6.1.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-GunyahFix-AnyKernel3.zip"
          zip -r "../output/${ZIP_NAME}" ./*

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: "GunyahFix-${{ inputs.kernelsu_variant }}-android14-6.1-${{ inputs.sub_level }}"
          path: output/
          retention-days: 30

      - name: 发布到 Releases
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v6.1.${{ inputs.sub_level }}-GunyahFix-${{ github.run_number }}"
          name: "小米14 Gunyah修复内核 6.1.${{ inputs.sub_level }}"
          body: |
            ## 小米14 (SM8650) Gunyah 修复内核

            **构建参数**:
            - 内核版本: 6.1.${{ inputs.sub_level }}
            - 安全补丁: ${{ inputs.os_patch_level }}
            - KernelSU: ${{ inputs.kernelsu_variant }}
            - NTsync: ${{ inputs.use_ntsync }}
            - 虚拟化: ${{ inputs.virtualization_support }}

            **修复内容**:
            - 修复骁龙8 Gen 3 (SM8650) 的 Gunyah 内存分配问题
            - 解决虚拟机启动失败问题 (CVE-2026-43347)
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}